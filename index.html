<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Malik Family Adventures</title>
  <meta name="theme-color" content="#fbf7ef" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <header class="app-hero">
      <div class="hero-copy">
        <div class="kicker">Malik Family Adventures</div>
        <h1>California Coast</h1>
        <p>Jul 18–25, 2026 · ORD → LAX → Highway 1 → SFO → ORD</p>
      </div>
      <button id="shareBtn" class="pill-button glass">Share</button>
    </header>

    <nav class="tabbar" aria-label="Main navigation">
      <button data-tab="today" class="active">Today</button>
      <button data-tab="route">Route</button>
      <button data-tab="stays">Stays</button>
      <button data-tab="vault">Vault</button>
    </nav>

    <main>
      <section id="today" class="panel active"></section>
      <section id="route" class="panel"></section>
      <section id="stays" class="panel"></section>
      <section id="vault" class="panel"></section>
    </main>
  </div>

  <script src="firebase-config.js"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
